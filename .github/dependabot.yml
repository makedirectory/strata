version: 2
updates:
  # npm dependencies — grouped to keep PR noise down.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Roll routine non-major bumps into a single PR per group.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # Keep GitHub Actions pinned to current major versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    labels:
      - dependencies
      - github-actions
