name: 🐛 Bug report
description: Report something that isn't working as expected.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I drag an S3 bucket onto the canvas…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. Include a sample graph/IaC file if relevant.
      placeholder: |
        1. Run `npm run dev`
        2. Open http://localhost:3000
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Canvas / UI
        - Service registry
        - IaC import (CloudFormation / Terraform)
        - Persistence / API
        - Docs
        - Build / tooling
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version (`node -v`), browser.
      placeholder: |
        - OS: macOS 15.5
        - Node: 22.x
        - Browser: Chrome 140
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      render: shell
    validations:
      required: false
