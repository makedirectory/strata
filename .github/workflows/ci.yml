name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast static checks: typecheck, lint, and Prettier formatting.
  quality:
    name: Lint, format & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Resolve fresh from package.json (ignore the committed, macOS-generated
        # lockfile): both `npm ci` and a lockfile-respecting `npm install` skip
        # the Linux native bindings it doesn't pin (rolldown, simple-git,
        # lightningcss…). --no-package-lock makes npm fetch each runner's correct
        # platform binaries. See npm/cli#4828.
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # Vitest suite (unit, component, and snapshot tests) with coverage, run
  # across the supported Node.js versions.
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # Resolve fresh from package.json (ignore the committed, macOS-generated
        # lockfile): both `npm ci` and a lockfile-respecting `npm install` skip
        # the Linux native bindings it doesn't pin (rolldown, simple-git,
        # lightningcss…). --no-package-lock makes npm fetch each runner's correct
        # platform binaries. See npm/cli#4828.
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: matrix.node == 24
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # Ensure the product app and prerendered docs build.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Resolve fresh from package.json (ignore the committed, macOS-generated
        # lockfile): both `npm ci` and a lockfile-respecting `npm install` skip
        # the Linux native bindings it doesn't pin (rolldown, simple-git,
        # lightningcss…). --no-package-lock makes npm fetch each runner's correct
        # platform binaries. See npm/cli#4828.
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Build
        run: npm run build
